<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Bookings</title>
</head>
<body>
    <h1>Manage My Bookings</h1>
    
    <div>
        <h2>Find Your Booking</h2>
        <form id="searchForm">
            <div>
                <label for="searchSessionId">Session ID (e.g., 260703-1234):</label><br>
                <input type="text" id="searchSessionId" required placeholder="Enter your Session ID">
            </div>
            <br>
            <button type="submit">Find Booking</button>
        </form>
    </div>

    <div id="bookingResult" style="margin-top:20px;display:none;">
        <h3>Your Booking Details</h3>
        <div id="bookingDetails"></div>
    </div>

    <div id="message" style="margin-top:20px;padding:10px;border:1px solid #ccc;display:none;"></div>
    
    <br>
    <a href="booking.html">← Book New Lesson</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="bookingassets/js/manage.js"></script>
</body>
</html>
