<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Lesson Booking</title>
</head>
<body>
    <h1>Book Motorcycle Lesson</h1>


    <div style="margin-bottom:20px;padding:10px;background:#f5f5f5;border-radius:4px;">
        <a href="manage-booking.html">🔍 Manage My Bookings</a>
    </div>
    
    <!-- Step 1: Class Selection -->
    <div id="step1">
        <h2>Step 1: Select Class</h2>
        <form id="classForm">
            <div>
                <input type="radio" id="classB" name="class" value="B" required>
                <label for="classB">Class B (Heavy Motorcycle)</label>
            </div>
            <div>
                <input type="radio" id="classB2" name="class" value="B2" required>
                <label for="classB2">Class B2 (Light Motorcycle)</label>
            </div>
            <br>
            <button type="submit">Next: Select Date</button>
        </form>
    </div>

    <!-- Step 2: Calendar & Session Selection -->
    <div id="step2" style="display:none;">
        <h2>Step 2: Select Date &amp; Session</h2>
        <div id="selectedClassDisplay"></div>
        <br>
        
        <!-- Calendar Navigation -->
        <div>
            <button onclick="changeMonth(-1)">◀ Previous</button>
            <span id="currentMonthDisplay" style="font-weight:bold;margin:0 20px;"></span>
            <button onclick="changeMonth(1)">Next ▶</button>
            <button onclick="goToToday()" style="margin-left:20px;">Today</button>
        </div>
        <br>
        
        <!-- Calendar Grid -->
        <div id="calendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:700px;margin:0 auto;"></div>
        <br>
        
        <!-- Legend -->
        <div style="display:flex;gap:20px;justify-content:center;font-size:14px;">
            <span><span style="background:#2ecc71;padding:2px 10px;border-radius:3px;"> </span> Available</span>
            <span><span style="background:#e74c3c;padding:2px 10px;border-radius:3px;"> </span> Fully Booked</span>
            <span><span style="background:#95a5a6;padding:2px 10px;border-radius:3px;"> </span> Inactive/Closed</span>
            <span><span style="background:#3498db;padding:2px 10px;border-radius:3px;"> </span> Selected</span>
        </div>
        <br>
        
        <!-- Selected Date Display -->
        <div id="selectedDateDisplay" style="font-weight:bold;text-align:center;margin:10px 0;"></div>
        
        <!-- Available Sessions -->
        <div id="sessionsContainer" style="display:none;margin-top:20px;">
            <h3>Available Sessions</h3>
            <div id="sessionsList"></div>
            <br>
            <button id="nextToDetailsBtn" style="display:none;" onclick="goToStep3()">Next: Enter Details →</button>
        </div>
        
        <br>
        <button onclick="goBackStep1()">← Back to Class Selection</button>
    </div>

    <!-- Step 3: Student Details -->
    <div id="step3" style="display:none;">
        <h2>Step 3: Your Details</h2>
        <div id="dayDuplicateWarning"></div>
        <form id="detailsForm">
            <div>
                <label for="icno">IC Number (12 digits) or Passport No:</label><br>
                <input type="text" id="icno" name="icno" required maxlength="20" placeholder="e.g., 123456789012">
            </div>
            <br>
            
            <div>
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" required placeholder="e.g., Ahmad bin Abdullah">
            </div>
            <br>
            
            <div>
                <label for="contact">Contact Number:</label><br>
                <input type="text" id="contact" name="contact" required placeholder="e.g., 0123456789">
            </div>
            <br>
            
            <button type="submit">Next: Review Booking →</button>
            <button type="button" onclick="goBackStep2()">← Back to Calendar</button>
        </form>
    </div>

    <!-- Step 4: Confirmation -->
    <div id="step4" style="display:none;">
        <h2>Step 4: Review &amp; Confirm</h2>
        <div id="bookingSummary"></div>
        <br>
        <button onclick="submitBooking()">✓ Confirm Booking</button>
        <button onclick="goBackStep3()">← Edit Details</button>
        <button onclick="goBackStep2()">← Change Date</button>
    </div>

    <!-- Step 5: Success -->
    <div id="step5" style="display:none;">
        <h2>✅ Booking Confirmed!</h2>
        <div id="confirmationDetails"></div>
        <br>
        <button onclick="resetAll()">Book Another</button>
        <button onclick="window.location.href='manage-booking.html'">Manage My Bookings</button>
    </div>

    <!-- Message Display -->
    <div id="message" style="margin-top:20px;padding:10px;border:1px solid #ccc;display:none;"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Booking Logic -->
    <script src="bookingassets/js/booking.js"></script>
</body>
</html>
