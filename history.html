<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Past Documents | ADC App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      padding: 20px;
      font-family: sans-serif;
      background: #f9fafb;
    }
    h1 {
      color: #007bff;
      text-align: center;
      margin-bottom: 25px;
    }

    /* 🔍 Search Bar */
    #search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      justify-content: center;
    }
    #search-bar input,
    #search-bar select {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #search-btn {
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
    }
    #search-btn:hover {
      background: #0056b3;
    }

    /* 💻 Table layout (desktop) */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
    }
    th {
      background: #f3f3f3;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background: #fafafa;
    }
    a.view-link {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
      margin-right: 8px;
    }
    a.view-link:hover {
      text-decoration: underline;
    }
    button.edit-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
      font-size: 12px;
    }
    button.edit-btn:hover {
      background: #218838;
    }
    button.resend-btn {
      background: #17a2b8;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button.resend-btn:hover {
      background: #138496;
    }

    /* 📱 Mobile: convert table to cards */
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead { display: none; }

      tbody tr {
        margin-bottom: 12px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        padding: 12px;
      }
      tbody tr td {
        border: none;
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
      }
      tbody tr td::before {
        content: attr(data-label);
        font-weight: 600;
        color: #444;
      }
      tbody tr td .action-buttons {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        width: 100%;
      }
    }

    /* 📄 Pagination */
    #pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
    }
    #pagination button {
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }
    #pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 {
      margin-top: 0;
      color: #007bff;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .btn-primary {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #0056b3;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: #545b62;
    }
    .line-item {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
    }
    .line-item input {
      flex: 1;
    }
    .line-item .remove-line {
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .line-item .remove-line:hover {
      background: #c82333;
    }
    #add-line-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    #add-line-btn:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <h1>Past Documents</h1>
  
  <div id="search-bar">
    <input type="text" id="search-name" placeholder="Search by customer name..." />
    <input type="date" id="search-date" />
    <select id="filter-type">
      <option value="">All Types</option>
      <option value="invoice">Invoice</option>
      <option value="quotation">Quotation</option>
    </select>
    <button id="search-btn">Search</button>
  </div>

  <table id="docs-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Document No</th>
        <th>Type</th>
        <th>Customer</th>
        <th>Total (RM)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="pagination">
    <button id="prev-btn">Previous</button>
    <span id="page-info"></span>
    <button id="next-btn">Next</button>
  </div>
  <button onclick="window.location.href='index.html'">Back</button>

  <!-- Edit Document Modal -->
  <div id="editModal" class="modal-overlay">
    <div class="modal">
      <h3>Edit Document</h3>
      <form id="edit-form">
        <div class="form-group">
          <label>Document No:</label>
          <input type="text" id="edit-doc-no" readonly>
        </div>
        <div class="form-group">
          <label>Date:</label>
          <input type="text" id="edit-date" readonly>
        </div>
        <div class="form-group">
          <label>Type:</label>
          <input type="text" id="edit-type" readonly>
        </div>
        <div class="form-group">
          <label>Customer Name:</label>
          <input type="text" id="edit-customer-name" required>
        </div>
        <div class="form-group">
          <label>Customer Contact:</label>
          <input type="text" id="edit-customer-contact">
        </div>
        <div class="form-group">
          <label>Customer Email:</label>
          <input type="email" id="edit-customer-email">
        </div>
        <div class="form-group">
          <label>Customer Address:</label>
          <textarea id="edit-customer-address"></textarea>
        </div>
        <div class="form-group">
          <label>Notes:</label>
          <textarea id="edit-notes"></textarea>
        </div>
        
        <h4>Line Items</h4>
        <div id="edit-line-items"></div>
        <button type="button" id="add-line-btn">+ Add Line Item</button>
        
        <div class="modal-actions">
          <button type="button" id="cancel-edit" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Re-send Modal -->
  <div id="resendModal" class="modal-overlay">
    <div class="modal" style="max-width: 400px;">
      <h3>Share Document</h3>
      <p id="resend-doc-info" style="text-align: center; margin-bottom: 20px;"></p>
      
      <button id="resend-view-report" style="background:#007bff;color:#fff;border:none;padding:12px 15px;border-radius:8px;margin:8px 0;width:100%;font-size:14px;cursor:pointer;">
        📄 View Report
      </button>
      
      <button id="resend-whatsapp" style="background:#25D366;color:#fff;border:none;padding:12px 15px;border-radius:8px;margin:8px 0;width:100%;font-size:14px;cursor:pointer;">
        💬 Share via WhatsApp
      </button>
      
      <button id="resend-email" style="background:#ea4335;color:#fff;border:none;padding:12px 15px;border-radius:8px;margin:8px 0;width:100%;font-size:14px;cursor:pointer;">
        📧 Share via Email
      </button>
      
      <button id="resend-copy-link" style="background:#6c757d;color:#fff;border:none;padding:12px 15px;border-radius:8px;margin:8px 0;width:100%;font-size:14px;cursor:pointer;">
        🔗 Copy Link
      </button>
      
      <button id="close-resend" style="background:#ccc;color:#000;border:none;padding:10px 15px;border-radius:8px;margin-top:15px;width:100%;font-size:14px;cursor:pointer;">
        Close
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/history.js"></script>
</body>
</html>
